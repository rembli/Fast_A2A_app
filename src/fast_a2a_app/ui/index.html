<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A2A Agent UI</title>
  <script>
    // Apply theme before paint to avoid a flash of light mode in dark.
    (function () {
      var stored = localStorage.getItem('chatTheme');
      var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if ((stored ? stored : (prefersDark ? 'dark' : 'light')) === 'dark') {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-slate-100 h-screen flex flex-col font-sans antialiased">

  <!-- ── Header ── -->
  <header class="bg-white shadow-sm px-5 py-3 flex items-center justify-between shrink-0">
    <div class="flex items-center gap-3 min-w-0">
      <img src="a2a-ui.png" alt="A2A-UI" class="h-7 w-auto shrink-0 brand-logo">
      <div class="min-w-0">
        <h1 id="agent-name" class="text-sm font-semibold text-slate-800 truncate">PPT Agent</h1>
        <p  id="agent-desc" class="text-xs text-slate-400 truncate mt-0.5"></p>
      </div>
    </div>
    <div class="flex items-center gap-3 shrink-0 ml-4">
      <button id="theme-toggle" title="Toggle dark mode" aria-label="Toggle dark mode"
        class="text-slate-400 hover:text-slate-700 transition p-1.5 rounded-md">
        <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" width="16" height="16"
          fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"
          style="pointer-events:none">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
        </svg>
        <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="16" height="16"
          fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"
          style="pointer-events:none">
          <circle cx="12" cy="12" r="4"/>
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M12 2v2m0 16v2M4.93 4.93l1.41 1.41m11.32 11.32l1.41 1.41M2 12h2m16 0h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
        </svg>
      </button>
      <button id="card-toggle"
        class="text-xs text-blue-600 hover:text-blue-800 hover:underline transition">
        Agent info
      </button>
      <button id="new-chat-btn"
        class="bg-blue-600 hover:bg-blue-700 text-white text-xs px-3 py-1.5 rounded-md transition">
        + New chat
      </button>
    </div>
  </header>

  <!-- ── Agent card panel (collapsible) ── -->
  <div id="card-panel" class="hidden bg-blue-50 border-b border-blue-100 px-5 py-3 shrink-0">
    <div id="card-body" class="text-xs text-slate-700 space-y-0.5 leading-5"></div>
  </div>

  <!-- ── Context ID bar ── -->
  <div id="context-bar" class="bg-white border-b px-5 py-1 shrink-0 flex items-center gap-2">
    <span class="text-[11px] text-slate-400">context-id</span>
    <span id="cid-display"
      class="text-[11px] font-mono text-slate-500 truncate max-w-xs">—</span>
  </div>

  <!-- ── Messages ── -->
  <div id="messages" class="flex-1 overflow-y-auto px-5 py-5 space-y-4"></div>
  <pre id="debug-console" class="hidden flex-1 overflow-y-auto"></pre>

  <!-- ── View tabs (Chat / Debug) ── -->
  <div class="view-tabs-bar shrink-0">
    <button id="tab-chat"  class="view-tab active" data-view="chat">Chat</button>
    <button id="tab-debug" class="view-tab"        data-view="debug">Debug</button>
  </div>

  <!-- ── Input ── -->
  <div id="composer" class="bg-white border-t px-5 pt-4 pb-1 shrink-0">
    <div class="max-w-3xl mx-auto">
      <!-- Attachment preview strip (hidden until files are attached) -->
      <div id="attachments" class="hidden flex flex-wrap gap-2 mb-2"></div>
      <div class="flex gap-3 items-end">
        <!-- The `accept` attribute is set at runtime from
             UI_CONFIG.acceptedFileTypes — see build_a2a_ui's
             accepted_file_types parameter. -->
        <input type="file" id="file-input" class="hidden" multiple>
        <button id="attach-btn" title="Attach file"
          class="text-slate-400 hover:text-blue-600 disabled:opacity-40 transition
                 px-2.5 py-2.5 rounded-xl shrink-0 self-end">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20"
            fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 10-5.656-5.656l-6.586 6.586a6 6 0 108.485 8.485L20.5 13"/>
          </svg>
        </button>
        <textarea id="input" rows="2"
          placeholder="Type a message… (Enter to send, Shift+Enter for newline)"
          class="flex-1 border border-slate-300 rounded-xl px-3.5 py-2.5 text-sm
                 resize-none focus:outline-none focus:ring-2 focus:ring-blue-500
                 disabled:opacity-50 transition">
        </textarea>
        <!-- Hidden until agent card confirms streaming support -->
        <label id="stream-toggle-label"
          class="hidden flex-col items-center gap-0.5 text-[11px] text-slate-400
                 select-none cursor-pointer shrink-0 pb-0.5">
          <input type="checkbox" id="stream-toggle" class="accent-blue-600 w-3.5 h-3.5">
          Stream
        </label>
        <button id="send-btn"
          class="bg-blue-600 hover:bg-blue-700 disabled:opacity-40 text-white
                 px-4 py-2.5 rounded-xl text-sm font-medium transition shrink-0">
          Send
        </button>
        <button id="stop-btn"
          class="hidden bg-red-500 hover:bg-red-600 text-white
                 px-4 py-2.5 rounded-xl text-sm font-medium transition shrink-0">
          Stop
        </button>
      </div>
    </div>
  </div>

  <!-- ── Version footer ── -->
  <footer id="version-footer"
    class="bg-white shrink-0 text-center text-[10px] text-slate-400 py-1 select-none"></footer>

  <!-- ── Fullscreen image viewer / editor (hidden by default) ── -->
  <div id="fullscreen"
    class="hidden fixed inset-0 z-50 bg-black/90 flex flex-col select-none">
    <!-- Top bar -->
    <div class="flex items-center justify-between px-5 py-3 text-white shrink-0">
      <span id="fs-counter" class="text-xs opacity-70 font-mono">0 / 0</span>
      <button id="fs-close"
        class="text-white/70 hover:text-white text-sm flex items-center gap-1 px-2 py-1 rounded transition">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none"
          viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
        </svg>
        Close
      </button>
    </div>
    <!-- Image stage -->
    <div class="flex-1 flex items-center justify-center relative px-4 min-h-0">
      <button id="fs-prev"
        class="absolute left-4 top-1/2 -translate-y-1/2 z-10 text-white/70 hover:text-white
               disabled:opacity-20 disabled:cursor-not-allowed bg-white/10 hover:bg-white/20
               rounded-full w-10 h-10 flex items-center justify-center transition">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="none"
          viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"
          class="pointer-events-none">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
        </svg>
      </button>
      <img id="fs-img" class="max-w-full max-h-full object-contain rounded shadow-2xl" alt="">
      <button id="fs-next"
        class="absolute right-4 top-1/2 -translate-y-1/2 z-10 text-white/70 hover:text-white
               disabled:opacity-20 disabled:cursor-not-allowed bg-white/10 hover:bg-white/20
               rounded-full w-10 h-10 flex items-center justify-center transition">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="none"
          viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"
          class="pointer-events-none">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/>
        </svg>
      </button>
      <!-- Loader overlay shown while a fullscreen turn is in flight -->
      <div id="fs-loader"
        class="hidden absolute inset-0 flex items-center justify-center pointer-events-none">
        <span class="spinner spinner-lg"></span>
      </div>
    </div>
    <!-- Quick-reply suggestions for the most-recent turn — populated by
         renderFullscreenSuggestions(), cleared on close / nav / new send.
         Pills are centred within the 3xl-capped row so they read as a
         "next-step picker" rather than a left-aligned overflow strip. -->
    <div id="fs-suggestions"
         class="hidden px-5 pt-3 shrink-0 max-w-3xl mx-auto w-full flex flex-wrap justify-center gap-2"></div>
    <!-- Input -->
    <div class="px-5 py-4 shrink-0">
      <div class="flex gap-3 items-end max-w-3xl mx-auto">
        <textarea id="fs-input" rows="2"
          placeholder="Describe how to change this image…"
          class="flex-1 bg-white/10 text-white placeholder:text-white/40 border border-white/20
                 rounded-xl px-3.5 py-2.5 text-sm resize-none focus:outline-none focus:ring-2
                 focus:ring-blue-400 disabled:opacity-50 transition"></textarea>
        <button id="fs-send"
          class="bg-blue-600 hover:bg-blue-700 disabled:opacity-40 text-white
                 px-4 py-2.5 rounded-xl text-sm font-medium transition shrink-0">
          Send
        </button>
      </div>
    </div>
  </div>


<script>
/* UI_CONFIG */
/* DATA_TYPE_RENDERERS */
(function () {
  var el = document.getElementById('version-footer');
  var v = (window.UI_CONFIG && window.UI_CONFIG.libraryVersion) || '';
  if (el && v) el.textContent = 'fast_a2a_app v' + v;
})();
</script>
<script src="app.js" defer></script>
</body>
</html>
